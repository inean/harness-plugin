name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-json:
    name: Validate plugin JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Codex plugin manifest
        run: python3 -m json.tool plugins/harness-plugin/.codex-plugin/plugin.json > /dev/null
      - name: Validate Claude-compatible plugin manifest
        run: python3 -m json.tool plugins/harness-plugin/.claude-plugin/plugin.json > /dev/null
      - name: Validate Codex marketplace
        run: python3 -m json.tool .agents/plugins/marketplace.json > /dev/null
      - name: Validate Claude-compatible marketplace
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null

  check-docs:
    name: Doc consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run consistency checks
        run: bash scripts/check-docs.sh

  consistency-check:
    name: GC Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run GC consistency checks
        run: bash scripts/gc/check-consistency.sh

  check-required-files:
    name: Required files exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check required files
        run: |
          MISSING=0
          for f in AGENTS.md ARCHITECTURE.md INSTALL.md README.md \
                   .agents/plugins/marketplace.json .claude-plugin/marketplace.json \
                   plugins/harness-plugin/.codex-plugin/plugin.json \
                   plugins/harness-plugin/.claude-plugin/plugin.json \
                   plugins/harness-plugin/skills/harness-plugin/SKILL.md \
                   plugins/harness-plugin/skills/harness-plugin/references/migration-playbook.md \
                   plugins/harness-plugin/skills/harness-plugin/references/capability-packs.md \
                   plugins/harness-plugin/skills/harness-plugin/references/observability-migration.md \
                   plugins/harness-plugin/skills/harness-plugin/references/runtime-validation-workflow.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "$MISSING required file(s) missing"
            exit 1
          fi
          echo "All required files present"
